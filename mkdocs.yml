#site_name: My Docs

site_name: Advanced Cyberinfrastructure for Education and Research
site_description: UIC ACER user documentation
site_url: https://uicacer.github.io/acer-hpc-docs/

extra_css:
  - assets/stylesheets/extra.css

theme:
  name: material

  logo: assets/images/acer-logo.png

  favicon: assets/images/acer-logo.png

  palette:
    - scheme: default
      primary: blue
      accent: red

      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: blue
      accent: red

      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search

nav:
  - Home: index.md

  - Getting Started:
      - Overview: getting-started/index.md
      - Account Requests: getting-started/accounts.md
      - Login: getting-started/login.md

  - Lakeshore:
      - Overview: lakeshore/index.md
      - Slurm: lakeshore/slurm.md
      - GPU Jobs: lakeshore/gpu-jobs.md
      - Storage: lakeshore/storage.md
      - Partitions: lakeshore/partitions.md

  - Software:
      - Overview: software/index.md
      - Python: software/python.md
      - PyTorch: software/pytorch.md
      - CUDA: software/cuda.md
      - GROMACS: software/gromacs.md

  - AI:
      - Overview: ai/index.md
      - Ollama: ai/ollama.md
      - RAG: ai/rag.md

  - Quantum:
      - Overview: quantum/index.md
      - Qiskit: quantum/qiskit.md
      - PennyLane: quantum/pennylane.md
      - CUDA-Q: quantum/cuda-q.md

  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true


